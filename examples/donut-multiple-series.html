<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <title>Donut Chart - Multiple Series</title>
  <link rel="stylesheet" href="../src/css/d3charts.css" />
  <style>
    body { font-family: sans-serif; padding: 2rem; background: #fff; max-width: 960px; }
    #chart { width: 100%; height: 400px; position: relative; }
  </style>
</head>
<body>
  <h2>Donut Chart - Multiple Series</h2>
<p><a href="gallery.html" style="font-family:sans-serif;font-size:0.875rem;color:#5491F6;text-decoration:none;">← Gallery</a></p>
  <div id="chart"></div>

  <script type="module">
    import { DonutChart } from "@frnkclsst/d3charts";

    const data = {
      categories: {
        format: "%s",
        data: ["1750", "1800", "1850", "1900", "1950", "1999", "2050"]
      },
      series: [
        { name: "Asia",    data: [52, 635, 809, 947, 1402, 3634, 5268] },
        { name: "Africa",  data: [20, 107, 111, 133,  221,  767, 1766] },
        { name: "Europe",  data: [30, 203, 276, 408,  547,  729,  628] },
        { name: "America", data: [40,  31,  54, 156,  339,  818, 1201] },
        { name: "Oceania", data: [50,  20,  20,  60,  130,  300,  460] }
      ]
    };

    const options = {
      titleArea: { text: "Donut Chart - Multiple Series", height: 50 },
      legendArea: { title: "Year", width: 200 },
      plotArea: { padding: 20 }
    };

    const chart = new DonutChart("#chart", data, options);
    chart.draw();
  </script>
</body>
</html>
