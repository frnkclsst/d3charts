<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="img/favicon.svg" />
  <title>No Data Available</title>
  <link rel="stylesheet" href="../src/css/d3charts.css" />
  <style>
    body { font-family: sans-serif; padding: 2rem; background: #fff; max-width: 960px; }
    #chart { width: 100%; height: 400px; position: relative; }
  </style>
</head>
<body>
  <h2>No Data Available</h2>
<p><a href="gallery.html" style="font-family:sans-serif;font-size:0.875rem;color:#5491F6;text-decoration:none;">← Gallery</a></p>
  <div id="chart"></div>

  <script type="module">
    import { LineChart, GridLineTypes, CurveTypes } from "@frnkclsst/d3charts";

    const data = {
      categories: {
        format: "%s",
        data: [
          "1940", "1941", "1942", "1943", "1944", "1945", "1946", "1947", "1948", "1949",
          "1950", "1951", "1952", "1953", "1954", "1955", "1956", "1957", "1958", "1959",
          "1960", "1961", "1962", "1963", "1964", "1965", "1966", "1967", "1968", "1969",
          "1970", "1971", "1972", "1973", "1974", "1975", "1976", "1977", "1978", "1979",
          "1980", "1981", "1982", "1983", "1984", "1985", "1986", "1987", "1988", "1989",
          "1990", "1991", "1992", "1993", "1994", "1995", "1996", "1997", "1998", "1999",
          "2000", "2001", "2002", "2003", "2004", "2005", "2006"
        ]
      },
      series: [
        { name: "USA",         data: [], min: [], max: [] },
        { name: "USSR/Russia", data: [], min: [], max: [] }
      ]
    };

    const options = {
      titleArea: { text: "Area Chart - Basic", height: 50 },
      legendArea: { title: "Country", width: 200 },
      plotArea: { padding: 20 },
      plotOptions: {
        area: { visible: true },
        line: { interpolation: CurveTypes.Linear },
        markers: { visible: false }
      },
      xAxis: [{ gridlines: GridLineTypes.None, tickmarks: true, title: { text: "Year" } }],
      yAxis: [{ gridlines: GridLineTypes.None, tickmarks: false, title: { text: "Nuclear weapon status" } }]
    };

    const chart = new LineChart("#chart", data, options);
    chart.draw();
  </script>
</body>
</html>
