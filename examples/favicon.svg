<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#1B487F"/>
  <!--
    Pie chart: center (16,16) radius 12, starting from top (12 o'clock), clockwise.
    Point formula: x = 16 + 12·sin(θ),  y = 16 − 12·cos(θ)
    Slice 1: 35% → 126°  end=(25.71, 23.06)
    Slice 2: 25% →  90°  end=( 8.95, 25.71)
    Slice 3: 20% →  72°  end=( 4.59, 12.29)
    Slice 4: 20% →  72°  end=(16.00,  4.00)  (back to start)
  -->
  <path d="M16,16 L16,4 A12,12 0 0,1 25.71,23.06 Z" fill="#FFA300"/>
  <path d="M16,16 L25.71,23.06 A12,12 0 0,1 8.95,25.71 Z" fill="#7AC124"/>
  <path d="M16,16 L8.95,25.71 A12,12 0 0,1 4.59,12.29 Z" fill="#5491F6"/>
  <path d="M16,16 L4.59,12.29 A12,12 0 0,1 16,4 Z" fill="#F16A73"/>
  <!-- Donut hole -->
  <circle cx="16" cy="16" r="4.5" fill="#1B487F"/>
</svg>
