<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <title>Scatter chart</title>
  <link rel="stylesheet" href="../src/css/d3charts.css" />
  <style>
    
    body { font-family: sans-serif; padding: 2rem; background: #fff; max-width: 960px; }
    #chart { width: 100%; height: 450px; position: relative; }
  </style>
</head>
<body>
  <h2>Scatter chart</h2>
<p><a href="gallery.html" style="font-family:sans-serif;font-size:0.875rem;color:#5491F6;text-decoration:none;">← Gallery</a></p>
  <div id="chart"></div>

  <script type="module">
    import { ScatterChart, GridLineTypes, OrientationTypes } from "@frnkclsst/d3charts";

    // series[0] = X values; series[1..n] = Y values per group
    const data = {
      categories: { format: "%s", data: ["A","B","C","D","E","F","G","H","I","J"] },
      series: [
        { name: "X",       data: [1, 3, 5, 7, 2, 8, 4, 6, 9, 5] },
        { name: "Group 1", data: [2, 5, 4, 8, 3, 7, 6, 9, 5, 4] },
        { name: "Group 2", data: [8, 4, 7, 3, 6, 2, 5, 1, 4, 9] }
      ]
    };

    const options = {
      titleArea: { text: "Scatter Plot", height: 50 },
      legendArea: { width: 110, title: "Group" },
      yAxis: [{ orient: OrientationTypes.Left, gridlines: GridLineTypes.Major, title: { text: "Y" } }],
      xAxis: [{ orient: OrientationTypes.Bottom, gridlines: GridLineTypes.Major, title: { text: "X" } }],
      plotOptions: { animation: { duration: 600 } }
    };

    const chart = new ScatterChart("#chart", data, options);
    chart.draw();
  </script>
</body>
</html>
