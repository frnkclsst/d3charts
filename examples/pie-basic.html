<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="img/favicon.svg" />
  <title>Pie chart</title>
  <link rel="stylesheet" href="../src/css/d3charts.css" />
  <style>
    body { font-family: sans-serif; padding: 2rem; background: #fff; max-width: 960px; }
    #chart { width: 100%; height: 400px; position: relative; }
  </style>
</head>
<body>
  <h2>Pie chart</h2>
<p><a href="gallery.html" style="font-family:sans-serif;font-size:0.875rem;color:#5491F6;text-decoration:none;">← Gallery</a></p>
  <div id="chart"></div>

  <script type="module">
    import { PieChart } from "@frnkclsst/d3charts";

    const data = {
      categories: { format: "%s", data: ["Chrome","Firefox","Safari","Edge","Other"] },
      series: [{ name: "Browser share", data: [63, 12, 19, 4, 2] }]
    };

    const options = {
      titleArea: { text: "Browser Market Share", height: 50 },
      legendArea: { width: 110, title: "Browser" },
      plotOptions: {
        pie: { innerRadius: 0 },
        animation: { duration: 800 }
      }
    };

    const chart = new PieChart("#chart", data, options);
    chart.draw();
  </script>
</body>
</html>
