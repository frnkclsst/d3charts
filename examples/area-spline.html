<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <title>Area Chart - Spline</title>
  <link rel="stylesheet" href="../src/css/d3charts.css" />
  <style>
    body { font-family: sans-serif; padding: 2rem; background: #fff; }
    #chart { width: 800px; height: 400px; position: relative; }
  </style>
</head>
<body>
  <h2>Area Chart - Spline</h2>
<p><a href="gallery.html" style="font-family:sans-serif;font-size:0.875rem;color:#5491F6;text-decoration:none;">← Gallery</a></p>
  <div id="chart"></div>

  <script type="module">
    import { LineChart, GridLineType } from "@frnkclsst/d3charts";

    const data = {
      categories: {
        format: "%s",
        data: ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"]
      },
      series: [
        { name: "John", data: [3, 4, 3, 5, 4, 10, 12] },
        { name: "Jane", data: [1, 3, 4, 3, 3, 5, 4] }
      ]
    };

    const options = {
      titleArea: { text: "Area Chart - Spline", height: 50 },
      legendArea: { title: "Who?", width: 200 },
      plotArea: { padding: 20 },
      plotOptions: {
        area: { visible: true },
        line: { interpolation: "cardinal" },
        markers: { visible: true }
      },
      xAxis: [{ gridlines: GridLineType.None, tickmarks: false, title: { text: "Day" } }],
      yAxis: [{ gridlines: GridLineType.None, tickmarks: true, title: { text: "Fruit Units" } }]
    };

    const chart = new LineChart("#chart", data, options);
    chart.draw();
  </script>
</body>
</html>
