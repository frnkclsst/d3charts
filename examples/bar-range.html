<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <title>Bar Chart - Range</title>
  <link rel="stylesheet" href="../src/css/d3charts.css" />
  <style>
    body { font-family: sans-serif; padding: 2rem; background: #fff; max-width: 960px; }
    #chart { width: 100%; height: 400px; position: relative; }
  </style>
</head>
<body>
  <h2>Bar Chart - Range</h2>
<p><a href="gallery.html" style="font-family:sans-serif;font-size:0.875rem;color:#5491F6;text-decoration:none;">← Gallery</a></p>
  <div id="chart"></div>

  <script type="module">
    import { BarChart, GridLineTypes } from "@frnkclsst/d3charts";

    const data = {
      categories: {
        format: "%s",
        data: ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"]
      },
      series: [
        {
          name: "Temperature",
          min: [-9.7, -8.7, -3.5, -1.4, 0, 2.9, 9.2, 7.3, 4.4, -3.1, -5.2, -13.5],
          max: [9.4, 6.5, 9.4, 19.9, 22.6, 29.5, 30.7, 26.5, 18.0, 11.4, 10.4, 9.8]
        }
      ]
    };

    const options = {
      titleArea: { text: "Bar Chart - Range", height: 50 },
      legendArea: { title: "Temperature Variations", width: 200 },
      plotArea: { padding: 20 },
      xAxis: [{ gridlines: GridLineTypes.None, tickmarks: false }],
      yAxis: [{ gridlines: GridLineTypes.None, tickmarks: true }]
    };

    const chart = new BarChart("#chart", data, options);
    chart.draw();
  </script>
</body>
</html>
