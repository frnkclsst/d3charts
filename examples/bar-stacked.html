<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="img/favicon.svg" />
  <title>Bar Chart - Stacked</title>
  <link rel="stylesheet" href="../src/css/d3charts.css" />
  <style>
    body { font-family: sans-serif; padding: 2rem; background: #fff; max-width: 960px; }
    #chart { width: 100%; height: 400px; position: relative; }
  </style>
</head>
<body>
  <h2>Bar Chart - Stacked</h2>
<p><a href="gallery.html" style="font-family:sans-serif;font-size:0.875rem;color:#5491F6;text-decoration:none;">← Gallery</a></p>
  <div id="chart"></div>

  <script type="module">
    import { StackedBarChart, GridLineTypes } from "@frnkclsst/d3charts";

    const data = {
      categories: {
        format: "%s",
        data: ["Apples", "Oranges", "Pears", "Grapes", "Bananas"]
      },
      series: [
        { name: "John", data: [5, 3, 4, 7, 2] },
        { name: "Jane", data: [2, 2, 3, 2, 1] },
        { name: "Joe",  data: [3, 4, 4, 2, 5] }
      ]
    };

    const options = {
      titleArea: { text: "Bar Chart - Stacked", height: 50 },
      legendArea: { title: "Who?", width: 200 },
      plotArea: { padding: 20 },
      xAxis: [{ gridlines: GridLineTypes.Major, tickmarks: false }],
      yAxis: [{ gridlines: GridLineTypes.None, tickmarks: true }]
    };

    const chart = new StackedBarChart("#chart", data, options);
    chart.draw();
  </script>
</body>
</html>
