<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <title>Line chart - stacked</title>
  <link rel="stylesheet" href="../src/css/d3charts.css" />
  <style>
    body { font-family: sans-serif; padding: 2rem; background: #fff; max-width: 960px; }
    #chart { width: 100%; height: 400px; position: relative; }
  </style>
</head>
<body>
  <h2>Line chart - stacked</h2>
<p><a href="gallery.html" style="font-family:sans-serif;font-size:0.875rem;color:#5491F6;text-decoration:none;">← Gallery</a></p>
  <div id="chart"></div>

  <script type="module">
    import { StackedLineChart, GridLineTypes, OrientationTypes } from "@frnkclsst/d3charts";

    const data = {
      categories: {
        format: "%Y-%m-%d",
        data: [
          "2024-01-01","2024-02-01","2024-03-01","2024-04-01",
          "2024-05-01","2024-06-01","2024-07-01","2024-08-01",
          "2024-09-01","2024-10-01","2024-11-01","2024-12-01"
        ]
      },
      series: [
        { name: "Product A", data: [42, 48, 55, 60, 65, 70, 75, 72, 68, 63, 58, 52] },
        { name: "Product B", data: [28, 32, 38, 44, 50, 55, 58, 54, 48, 42, 36, 30] },
        { name: "Product C", data: [18, 20, 24, 28, 32, 36, 40, 38, 34, 30, 26, 22] }
      ]
    };

    const options = {
      titleArea: { text: "Monthly Sales - Stacked Line", height: 50 },
      legendArea: { width: 120, title: "Product" },
      yAxis: [{ orient: OrientationTypes.Left, gridlines: GridLineTypes.Major, title: { text: "Units (K)" } }],
      xAxis: [{ orient: OrientationTypes.Bottom, labels: { format: "%b" } }],
      plotOptions: {
        area: { visible: true, opacity: 0.25 },
        markers: { visible: true, size: 4 },
        animation: { duration: 800 }
      }
    };

    const chart = new StackedLineChart("#chart", data, options);
    chart.draw();
  </script>
</body>
</html>
