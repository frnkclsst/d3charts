<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="img/favicon.svg" />
  <title>Line chart - with area</title>
  <link rel="stylesheet" href="../src/css/d3charts.css" />
  <style>
    body { font-family: sans-serif; padding: 2rem; background: #fff; max-width: 960px; }
    #chart { width: 100%; height: 400px; position: relative; }
  </style>
</head>
<body>
  <h2>Line chart - with area</h2>
<p><a href="gallery.html" style="font-family:sans-serif;font-size:0.875rem;color:#5491F6;text-decoration:none;">← Gallery</a></p>
  <div id="chart"></div>

  <script type="module">
    import { LineChart, GridLineTypes, OrientationTypes } from "@frnkclsst/d3charts";

    const data = {
      categories: {
        format: "%s",
        data: ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"]
      },
      series: [
        { name: "Tokyo",    data: [7, 6.9, 9.5, 14.5, 18.2, 21.5, 25.2, 26.5, 23.3, 18.3, 13.9, 9.6] },
        { name: "New York", data: [-0.2, 0.8, 5.7, 11.3, 17, 22, 24.8, 24.1, 20.1, 14.1, 8.6, 2.5] },
        { name: "Berlin",   data: [-10.9, -0.4, 3.5, 8.4, 13.5, 17, 18.6, 17.9, 14.3, 9, 3.9, 1] }
      ]
    };

    const options = {
      titleArea: { text: "Monthly Average Temperature", subtitle: "Source: WorldClimate.com", height: 60 },
      legendArea: { width: 120, title: "City" },
      yAxis: [{ orient: OrientationTypes.Left, gridlines: GridLineTypes.Major, title: { text: " °C" } }],
      xAxis: [{ orient: OrientationTypes.Bottom }],
      plotOptions: {
        area: { visible: true, opacity: 0.2 },
        markers: { visible: true, size: 5 },
        animation: { duration: 800 }
      }
    };

    const chart = new LineChart("#chart", data, options);
    chart.draw();
  </script>
</body>
</html>
