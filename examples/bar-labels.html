<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <title>Bar Chart - Labels</title>
  <link rel="stylesheet" href="../src/css/d3charts.css" />
  <style>
    body { font-family: sans-serif; padding: 2rem; background: #fff; }
    #chart { width: 800px; height: 400px; position: relative; }
  </style>
</head>
<body>
  <h2>Bar Chart - Labels</h2>
<p><a href="gallery.html" style="font-family:sans-serif;font-size:0.875rem;color:#5491F6;text-decoration:none;">← Gallery</a></p>
  <div id="chart"></div>

  <script type="module">
    import { BarChart, GridLineType } from "@frnkclsst/d3charts";

    const data = {
      categories: {
        format: "%s",
        data: ["Africa", "America", "Asia", "Europe", "Oceania"]
      },
      series: [
        { name: "Year 1800", data: [107,  31,  635, 203, 2] },
        { name: "Year 1900", data: [133, 156,  947, 408, 6] },
        { name: "Year 2008", data: [973, 914, 4054, 732, 34] }
      ]
    };

    const options = {
      titleArea: { text: "Bar Chart - Labels", height: 50 },
      legendArea: { title: "Continent", width: 200 },
      plotArea: { padding: 20 },
      series: { labels: { visible: true } },
      xAxis: [{ gridlines: GridLineType.Major, tickmarks: false, title: { text: "Population (millions)" } }],
      yAxis: [{ gridlines: GridLineType.None, tickmarks: true }]
    };

    const chart = new BarChart("#chart", data, options);
    chart.draw();
  </script>
</body>
</html>
