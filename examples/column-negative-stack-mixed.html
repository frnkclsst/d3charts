<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="img/favicon.svg" />
  <title>Column Chart - Negative Stack (Mixed)</title>
  <link rel="stylesheet" href="../src/css/d3charts.css" />
  <style>
    body { font-family: sans-serif; padding: 2rem; background: #fff; max-width: 960px; }
    #chart { width: 100%; height: 500px; position: relative; }
  </style>
</head>
<body>
  <h2>Column Chart - Negative Stack (Mixed)</h2>
  <p><a href="gallery.html" style="font-family:sans-serif;font-size:0.875rem;color:#5491F6;text-decoration:none;">← Gallery</a></p>
  <div id="chart"></div>

  <script type="module">
    import { StackedColumnChart, GridLineTypes, OrientationTypes } from "@frnkclsst/d3charts";

    // Quarterly profit/loss by product line (in millions)
    // Some quarters have losses (negative) mixed with profits (positive)
    const data = {
      categories: {
        format: "%s",
        data: ["Q1 2023", "Q2 2023", "Q3 2023", "Q4 2023", "Q1 2024", "Q2 2024", "Q3 2024", "Q4 2024"]
      },
      series: [
        {
          name: "Hardware",
          format: ".1f",
          data: [12, -8, 15, 20, -5, 18, 22, 30]
        },
        {
          name: "Software",
          format: ".1f",
          data: [25, 30, -10, 35, 40, -15, 45, 50]
        },
        {
          name: "Services",
          format: ".1f",
          data: [-5, 10, 8, -12, 15, 20, -8, 18]
        },
        {
          name: "Licensing",
          format: ".1f",
          data: [8, 12, 10, -6, 9, 14, 11, -4]
        }
      ]
    };

    const options = {
      titleArea: { text: "Quarterly Profit / Loss by Product Line (Ã¢â€šÂ¬M)", height: 50 },
      legendArea: { title: "Product Line", width: 200 },
      plotArea: { padding: 20 },
      xAxis: [{ gridlines: GridLineTypes.None, orient: OrientationTypes.Bottom, tickmarks: true }],
      yAxis: [{ gridlines: GridLineTypes.Major, orient: OrientationTypes.Left, tickmarks: false, title: { text: "Profit / Loss (Ã¢â€šÂ¬M)" } }]
    };

    const chart = new StackedColumnChart("#chart", data, options);
    chart.draw();
  </script>
</body>
</html>
