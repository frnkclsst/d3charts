<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="img/favicon.svg" />
  <title>Line Chart - Labels</title>
  <link rel="stylesheet" href="../src/css/d3charts.css" />
  <style>
    body { font-family: sans-serif; padding: 2rem; background: #fff; max-width: 960px; }
    #chart { width: 100%; height: 400px; position: relative; }
  </style>
</head>
<body>
  <h2>Line Chart - Labels</h2>
<p><a href="gallery.html" style="font-family:sans-serif;font-size:0.875rem;color:#5491F6;text-decoration:none;">← Gallery</a></p>
  <div id="chart"></div>

  <script type="module">
    import { LineChart, GridLineTypes, CurveTypes, OrientationTypes } from "@frnkclsst/d3charts";

    const data = {
      categories: {
        format: "%s",
        data: ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"]
      },
      series: [
        { name: "Tokyo",  data: [7.0, 6.9, 9.5, 14.5, 18.2, 21.5, 25.2, 26.5, 23.3, 18.3, 13.9, 9.6] },
        { name: "London", data: [3.9, 4.2, 5.7, 8.5, 11.9, 15.2, 17.0, 16.6, 14.2, 10.3, 6.6, 4.8] }
      ]
    };

    const options = {
      titleArea: { text: "Line Chart - Labels", height: 50 },
      legendArea: { title: "City", width: 200 },
      plotArea: { padding: 20 },
      plotOptions: {
        line: { interpolation: CurveTypes.Linear },
        markers: { visible: true }
      },
      series: { labels: { visible: true } },
      xAxis: [{ gridlines: GridLineTypes.None, tickmarks: false, title: { text: "Month" } }],
      yAxis: [{ gridlines: GridLineTypes.Major, orient: OrientationTypes.Left, tickmarks: true, title: { text: "Temperature" } }]
    };

    const chart = new LineChart("#chart", data, options);
    chart.draw();
  </script>
</body>
</html>
