<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <title>Scatter Chart</title>
  <link rel="stylesheet" href="../src/css/d3charts.css" />
  <style>
    body { font-family: sans-serif; padding: 2rem; background: #fff; }
    #chart { width: 800px; height: 400px; position: relative; }
  </style>
</head>
<body>
  <h2>Scatter Chart</h2>
<p><a href="gallery.html" style="font-family:sans-serif;font-size:0.875rem;color:#5491F6;text-decoration:none;">← Gallery</a></p>
  <div id="chart"></div>

  <script type="module">
    import { ScatterChart, GridLineType } from "@frnkclsst/d3charts";

    const data = {
      categories: {
        format: "%s",
        data: ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"]
      },
      series: [
        { data: [49.94, 71.53, 106.40, 129.21, 144.05, 176.07, 135.68, 148.58, 216.49, 194.11, 95.64, 54.43], format: ".2f" },
        { name: "Serie 1", data: [129.94, 31.53, 16.40, 149.21, 174.05, 189.07, 235.68, 48.58, 16.49, 94.11, 55.64, 44.43], format: ".2f" },
        { name: "Serie 2", data: [7.0, 6.9, 9.5, 14.5, 18.2, 21.5, 25.2, 26.5, 23.3, 18.3, 13.9, 9.6], format: ".1f" },
        { name: "Serie 3", data: [300, 346.9, 39.5, 124.5, 183.2, 221.5, 125.2, 126.5, 123.3, 118.3, 113.9, 91.6], format: ".1f" }
      ]
    };

    const options = {
      titleArea: { text: "Scatter Chart", height: 50 },
      legendArea: { title: "Series", width: 200 },
      plotArea: { padding: 20 },
      plotOptions: {
        markers: { visible: true, type: "circle" }
      },
      xAxis: [{ gridlines: GridLineType.None, tickmarks: false }],
      yAxis: [
        { gridlines: GridLineType.Major, orient: "left",  tickmarks: true },
        { gridlines: GridLineType.Major, orient: "right", tickmarks: true }
      ]
    };

    const chart = new ScatterChart("#chart", data, options);
    chart.draw();
  </script>
</body>
</html>
