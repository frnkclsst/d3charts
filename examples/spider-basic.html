<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <title>Spider chart</title>
  <link rel="stylesheet" href="../src/css/d3charts.css" />
  <style>
    body { font-family: sans-serif; padding: 2rem; background: #fff; }
    #chart { width: 550px; height: 480px; position: relative; }
  </style>
</head>
<body>
  <h2>Spider chart</h2>
  <p><a href="gallery.html" style="font-family:sans-serif;font-size:0.875rem;color:#5491F6;text-decoration:none;">← Gallery</a></p>
  <div id="chart"></div>

  <script type="module">
    import { SpiderChart, EaseTypes, MarkerTypes, SpiderGridlineTypes } from "@frnkclsst/d3charts";

    const data = {
      categories: { format: "%s", data: ["Speed", "Power", "Defense", "Range", "Accuracy", "Agility"] },
      series: [
        { name: "Unit Alpha", data: [85, 70, 60, 90, 80, 75] },
        { name: "Unit Beta",  data: [60, 90, 85, 65, 70, 55] },
        { name: "Unit Gamma", data: [75, 55, 70, 80, 95, 90] }
      ]
    };

    const options = {
      titleArea: { text: "Unit Comparison", height: 50 },
      legendArea: { width: 120, title: "Unit" },
      plotOptions: {
        animation: { duration: 900, ease: EaseTypes.Cubic },
        area: { visible: true, opacity: 0.15 },
        markers: { visible: true, size: 2, type: MarkerTypes.Circle },
        spider: { gridlines: SpiderGridlineTypes.Circle, levels: 5 }
      }
    };

    const chart = new SpiderChart("#chart", data, options);
    chart.draw();
  </script>
</body>
</html>
